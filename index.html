

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- daisyUI and Tailwind CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="min-h-screen mx-auto py-4 sm:py-6 md:py-8 px-2 sm:px-4 max-w-5xl bg-base-200">
    <header class="border-gray-300 border-b-1 pb-4">
        <h1 class="font-bold text-2xl sm:text-3xl text-blue-950 px-2 sm:px-4">Job Application Tracker</h1>
        <ul class="grid grid-cols-3 gap-2 sm:gap-4 mt-4 px-2 sm:px-4">
            <li class="bg-white p-3 sm:p-5 rounded-lg shadow">Total <br><span class="font-bold text-xl sm:text-2xl"
                    id="totalCount">8</span></li>
            <li class="bg-white p-3 sm:p-5 rounded-lg shadow">Interviews <br><span class="font-bold text-xl sm:text-2xl text-green-600"
                    id="interviewCount">0</span></li>
            <li class="bg-white p-3 sm:p-5 rounded-lg shadow">Rejected <br><span class="font-bold text-xl sm:text-2xl text-red-600"
                    id="rejectedCount">0</span></li>
        </ul>
    </header>


    <section>
        <div class="flex flex-row justify-between items-center mt-4 sm:mt-6 px-2 sm:px-4 pb-3 sm:pb-4">
            <h1 class="text-blue-950 font-bold text-lg sm:text-xl">Available Jobs</h1>
            <h2 class="text-gray-500 text-sm sm:text-base" id="jobsCount"><span>8</span> Jobs</h2>
        </div>
        <div class="px-2 sm:px-4 flex gap-2 pb-4">
            <button class="btn w-24 sm:w-30 h-9 sm:h-10 text-sm text-neutral/50 bg-blue-600 text-white tabs rounded-md" data-tab="all">All</button>
            <button class="btn w-24 sm:w-30 h-9 sm:h-10 text-sm text-neutral/50 tabs rounded-md" data-tab="interview">Interview</button>
            <button class="btn w-24 sm:w-30 h-9 sm:h-10 text-sm text-neutral/50 tabs rounded-md" data-tab="rejected">Rejected</button>
        </div>
        <div id="allJobs" class="flex flex-col gap-3 sm:gap-4 px-2 sm:px-4"></div>

        <!-- Interview and Rejected er Default Empty State -->
        <div id="emptyState" class="hidden text-center py-16 sm:py-20 px-4 p-6 bg-base-100 rounded-lg border border-base-200 hover:shadow-md transition-shadow relative flex-col items-center justify-center mx-2 sm:mx-4">
            <div class="text-7xl mb-6 opacity-50">
                <img src="jobs.png" alt="" class="mx-auto" />
            </div>
            <h3 class="text-xl sm:text-2xl font-bold mb-2">No jobs available</h3>
            <p class="text-base-content/70 text-sm sm:text-base">Check back soon for new job opportunities</p>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
